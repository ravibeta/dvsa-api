; Standalone pytest config for the Databricks connector suite.
;
; The repo-root pytest.ini wires pytest-django + coverage on `apps/`, which the
; connector tests neither need nor should pull in. CI runs these with
;   pytest -c tests/databricks/pytest.ini tests/databricks
; so the connector suite stays independent of the Django stack and can run in a
; lightweight Spark-only environment.
[pytest]
addopts =
python_files = test_*.py

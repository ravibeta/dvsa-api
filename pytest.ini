[pytest]
DJANGO_SETTINGS_MODULE = config.settings.testing
python_files = tests.py test_*.py *_tests.py
addopts = --cov=apps --cov-report=html --cov-report=term-missing --ignore=tests/databricks
# The Databricks connector suite (tests/databricks/) has its own pytest config
# and CI job (.github/workflows/ci-databricks.yml) with a Spark-only dependency
# set; it is excluded here so the core Django suite stays independent of pyspark.
name: CI (Databricks connector)

# Independent of the core CI: runs the connector suite on a local Spark
# (pyspark) environment with mocked DVSA endpoints. No live Databricks
# workspace or credentials are required.
on:
  push:
    branches: [main]
    paths:
      - "dvsa_databricks_connector/**"
      - "tests/databricks/**"
      - "notebooks/**"
      - "jobs/**"
      - "examples/pipeline_template/**"
      - "scripts/dbx_local_run.py"
      - "requirements/databricks-dev.txt"
      - ".github/workflows/ci-databricks.yml"
  pull_request:

jobs:
  connector-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/databricks-dev.txt

      # pyspark needs a JVM.
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/databricks-dev.txt
          # Install the connector itself (editable) so `import` resolves.
          pip install -e ./dvsa_databricks_connector

      - name: Lint connector package
        run: flake8 dvsa_databricks_connector --max-line-length=100 --extend-ignore=E203,W503

      - name: Lint notebooks (nbqa + flake8)
        run: |
          nbqa flake8 notebooks/databricks \
            --max-line-length=120 \
            --extend-ignore=E402,E703,F821,W503

      - name: Run connector tests (local Spark + mocked DVSA)
        env:
          # Keep Spark quiet and deterministic in CI.
          SPARK_LOCAL_IP: "127.0.0.1"
        run: pytest -c tests/databricks/pytest.ini tests/databricks -v

      - name: Validate Job template and notebook presence
        run: |
          python -c "import json; json.load(open('jobs/job_template.json'))"
          test -f notebooks/databricks/01-ingest-and-prepare.ipynb
          test -f docs/databricks_integration.md

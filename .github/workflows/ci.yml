name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/dev.txt

      # OpenCV (opencv-python) needs these shared libraries at import time.
      - name: Install OpenCV system libraries
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      # System check + migration-drift check run under a settings module with
      # migrations enabled (the testing module disables them on purpose).
      - name: Django system check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.base
          SECRET_KEY: ci-secret-key
        run: python manage.py check

      - name: Migration drift check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.base
          SECRET_KEY: ci-secret-key
        run: python manage.py makemigrations --check --dry-run

      # pytest.ini selects config.settings.testing (in-memory DB, eager Celery).
      - name: Run tests
        env:
          SECRET_KEY: ci-secret-key
        run: pytest
